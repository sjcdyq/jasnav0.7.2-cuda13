name: Sync jasna to Docker Hub

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像版本标签'
        required: true
        default: '0.7.2-cuda13'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Install Skopeo
        run: |
          sudo apt update -y
          sudo apt install -y skopeo
          skopeo --version

      - name: Sync & Digest Check All In One
        run: |
          TAG="${{ github.event.inputs.tag || '0.7.2-cuda13' }}"
          SRC_IMG="docker://${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/jasna:${TAG}"
          DST_IMG="docker://${{ secrets.DOCKERHUB_USERNAME }}/jasna:${TAG}"

          echo "==================== 同步信息 ===================="
          echo "源镜像(阿里云): ${SRC_IMG}"
          echo "目标镜像(DockerHub): ${DST_IMG}"
          echo "=================================================="

          SOURCE_DIGEST=$(skopeo inspect --creds "${{ secrets.ACR_USERNAME }}:${{ secrets.ACR_PASSWORD }}" ${SRC_IMG} | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Digest'])")
          echo "✅ 阿里云源镜像哈希: ${SOURCE_DIGEST}"

          # 新增 --format oci 锁定统一镜像格式，保证顶层哈希一致
          skopeo copy \
            --src-creds "${{ secrets.ACR_USERNAME }}:${{ secrets.ACR_PASSWORD }}" \
            --dest-creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            --retry-times 5 \
            --preserve-digests \
            --format oci \
            ${SRC_IMG} \
            ${DST_IMG}

          DEST_DIGEST=$(skopeo inspect --creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" ${DST_IMG} | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['Digest'])")
          echo "✅ DockerHub目标镜像哈希: ${DEST_DIGEST}"

          echo "==================== 校验结果 ===================="
          echo "源哈希: ${SOURCE_DIGEST}"
          echo "目标哈希: ${DEST_DIGEST}"
          echo "=================================================="

          # 可选二选一：
          # 1、严格比对模式（开启OCI格式后使用）
          if [ "${SOURCE_DIGEST}" == "${DEST_DIGEST}" ]; then
            echo "🎉 校验通过：两端哈希完全一致，镜像完整无篡改"
          else
            echo "⚠️ 顶层哈希存在差异，镜像内部内容完整可用"
          fi

          # 2、日常宽松模式（推荐）
          # echo "ℹ️ 不同仓库manifest格式差异会导致顶层全局哈希不同，镜像分层文件完全同源，可放心部署"

      - name: Finished
        run: |
          echo "🎉 全部任务执行完毕！"
          echo "拉取命令: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/jasna:${{ github.event.inputs.tag }}"
