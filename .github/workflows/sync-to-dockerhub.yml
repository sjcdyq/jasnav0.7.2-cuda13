name: Sync jasna-vnc to Docker Hub

on:
  # ① 手动触发（推荐先用这个测试）
  workflow_dispatch:
    inputs:
      tag:
        description: '要同步的镜像 Tag'
        required: true
        default: '0.7.2-cuda13'

  # ② 监听你 push 代码时自动触发（可选，按需保留）
  # push:
  #   branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 21GB 镜像，给足超时时间

    steps:
      # ────────────────────────────────────────
      # 步骤1：安装 Skopeo
      # ────────────────────────────────────────
      - name: Install Skopeo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y skopeo
          skopeo --version   # 打印版本确认安装成功

      # ────────────────────────────────────────
      # 步骤2：设置镜像地址变量
      # ────────────────────────────────────────
      - name: Set image addresses
        id: addr
        run: |
          TAG="${{ github.event.inputs.tag || '0.7.2-cuda13' }}"

          # 源：阿里云 ACR
          SRC="docker://${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/jasna-vnc:${TAG}"

          # 目标：Docker Hub（格式：docker://用户名/镜像名:tag）
          DST="docker://${{ secrets.DOCKERHUB_USERNAME }}/jasna-vnc:${TAG}"

          echo "SRC=${SRC}" >> $GITHUB_OUTPUT
          echo "DST=${DST}" >> $GITHUB_OUTPUT

          echo "📦 源镜像: ${SRC}"
          echo "📦 目标镜像: ${DST}"

      # ────────────────────────────────────────
      # 步骤3：核心 - Skopeo 直接复制（不拉到本地）
      # ────────────────────────────────────────
      - name: Copy image ACR → Docker Hub
        run: |
          skopeo copy \
            --src-creds  "${{ secrets.ACR_USERNAME }}:${{ secrets.ACR_PASSWORD }}" \
            --dest-creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            --retry-times 3 \
            ${{ steps.addr.outputs.SRC }} \
            ${{ steps.addr.outputs.DST }}

      # ────────────────────────────────────────
      # 步骤4：验证目标镜像 digest（可选但推荐）
      # ────────────────────────────────────────
      - name: Verify destination digest
        run: |
          skopeo inspect \
            --creds "${{ secrets.DOCKERHUB_USERNAME }}:${{ secrets.DOCKERHUB_TOKEN }}" \
            ${{ steps.addr.outputs.DST }} \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Digest:', d.get('Digest','N/A'))"

      - name: Done
        run: |
          echo "🎉 同步完成！"
          echo "Docker Hub 镜像地址: ${{ steps.addr.outputs.DST }}"
